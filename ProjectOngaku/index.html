<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Project: Ongaku</title>
    <style>
        :root {
            --primary-cyan: #00ffe5;
            --dark-bg: #1a1a2e;
            --ui-panel: rgba(0, 0, 0, 0.9);
            --text-color: white;
            --accent-pink: #ff00ff;
            --hold-green: #00ff88;
            --lane-glow: rgba(0, 255, 229, 0.3);
            --gem-color: #ffd700;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Helvetica', sans-serif;
            background: var(--dark-bg); color: var(--text-color);
            overflow: hidden; height: 100vh; width: 100vw; touch-action: none;
        }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; z-index: 5; }
        .hidden { display: none !important; }

        .sidebar { 
            width: 120px; background: var(--ui-panel); border-right: 3px solid var(--primary-cyan); 
            padding: 10px; z-index: 10; flex-shrink: 0; 
        }
        .nav-item { padding: 10px; margin: 8px 0; cursor: pointer; background: rgba(128,128,128,0.2); border-radius: 8px; text-align: center; font-weight: bold; font-size: 0.75rem; transition: 0.2s; }
        .selected { border: 2px solid var(--primary-cyan); background: rgba(0, 255, 229, 0.6); box-shadow: 0 0 10px var(--primary-cyan); }
        
        #gem-display { color: var(--gem-color); font-weight: bold; font-size: 0.9rem; text-align: center; margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 5px; }

        .content { padding: 15px; flex-grow: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .song-card, .char-card { 
            background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .buy-btn { background: var(--gem-color); color: black; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 0.7rem; }

        #game-area { position: relative; width: 90%; max-width: 400px; height: 100%; margin: 0 auto; perspective: 120px; }
        .lanes { display: flex; height: 100%; transform: rotateX(8deg); background: rgba(255,255,255,0.02); position: relative; }
        #perfect-line { position: absolute; bottom: 120px; width: 100%; height: 5px; background: white; box-shadow: 0 0 20px white; z-index: 30; pointer-events: none; }
        
        .lane { flex: 1; border-right: 1px solid rgba(255, 255, 255, 0.1); position: relative; display: flex; flex-direction: column; justify-content: flex-end; transition: background 0.1s; }
        .lane-active { background: linear-gradient(to top, var(--lane-glow), transparent) !important; }
        
        .hit-box { width: 100%; height: 120px; border: 3px solid var(--primary-cyan); background: rgba(0, 77, 69, 0.9); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 2rem; color: white; box-sizing: border-box; z-index: 20; }
        .note { position: absolute; width: 85%; left: 7.5%; height: 25px; background: var(--primary-cyan); border: 2px solid white; border-radius: 4px; z-index: 10; }
        #combo-display { position: absolute; right: 5%; top: 45%; font-size: 5rem; font-weight: 900; color: rgba(255, 255, 255, 0.3); pointer-events: none; z-index: 100; font-style: italic; }
        #hud { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; z-index: 100; }
        #hp-bar { width: 180px; height: 12px; background: #333; border: 2px solid white; margin: 0 auto; border-radius: 10px; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.2s; }
        #judgment-text { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; font-weight: 900; z-index: 100; pointer-events: none; text-shadow: 0 0 15px black; }
        #game-popup, #diff-menu, #pause-menu { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--ui-panel); border: 4px solid var(--primary-cyan); padding: 30px; border-radius: 20px; text-align: center; z-index: 1000; width: 80%; }
        .results-list { list-style: none; padding: 0; margin: 10px 0; text-align: left; display: inline-block; }
        .popup-btn { margin-top: 15px; padding: 12px 25px; background: var(--primary-cyan); color: black; font-weight: bold; border-radius: 10px; cursor: pointer; display: inline-block; }
        .locked { opacity: 0.5; pointer-events: none; }

        #portal-home-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            text-decoration: none;
            z-index: 99999;
            -webkit-tap-highlight-color: transparent;
        }
        #portal-home-btn:active {
            transform: scale(0.95);
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen">
        <div class="sidebar">
            <h1 style="color:var(--primary-cyan); font-size: 0.9rem;">ONGAKU</h1>
            <div id="gem-display">💎 <span id="gem-count">0</span></div>
            <div class="nav-item" onclick="showSection('songs')">Songs</div>
            <div class="nav-item" onclick="showSection('characters')">Chars</div>
            <div class="nav-item" onclick="showSection('shop')">Shop</div>
        </div>

        <div id="songs" class="content">
            <h2>Music Library</h2>
            <div id="song-list-container"></div>
        </div>

        <div id="characters" class="content hidden">
            <h2>Your Party (Max 3)</h2>
            <div id="char-list-container"></div>
        </div>

        <div id="shop" class="content hidden">
            <h2>Gem Shop</h2>
            <h3 style="font-size:0.8rem; color:var(--primary-cyan)">Buy Songs (200💎)</h3>
            <div id="shop-song-container"></div>
            <h3 style="font-size:0.8rem; color:var(--primary-cyan); margin-top:20px;">Buy Characters</h3>
            <div id="shop-char-container"></div>
        </div>
    </div>

    <div id="diff-menu" class="hidden">
        <h2 style="color:var(--primary-cyan)">Difficulty</h2>
        <div class="nav-item" onclick="setDiff(400, 5, 'easy')">Easy</div>
        <div class="nav-item" onclick="setDiff(700, 7, 'normal')">Normal</div>
        <div class="nav-item" onclick="setDiff(1000, 10, 'hard')">Hard</div>
        <div id="master-btn" class="nav-item" onclick="tryMaster()">Master</div>
        <div class="popup-btn" style="background:#444; color:white;" onclick="document.getElementById('diff-menu').classList.add('hidden')">Cancel</div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="combo-display">0</div>
        <div id="hud">
            <div id="hp-bar"><div id="hp-fill"></div></div>
            <div id="score-val" style="font-weight: bold; margin-top: 5px;">Score: 0</div>
            <button style="pointer-events: auto; margin-top: 5px; padding: 5px 15px;" onclick="togglePause()">PAUSE</button>
        </div>
        <div id="judgment-text"></div>
        <div id="game-area">
            <div id="perfect-line"></div>
            <div class="lanes">
                <div class="lane" id="l0" ontouchstart="checkHit(0)"><div class="hit-box">D</div></div>
                <div class="lane" id="l1" ontouchstart="checkHit(1)"><div class="hit-box">F</div></div>
                <div class="lane" id="l2" ontouchstart="checkHit(2)"><div class="hit-box">J</div></div>
                <div class="lane" id="l3" ontouchstart="checkHit(3)"><div class="hit-box">K</div></div>
            </div>
        </div>
    </div>

    <div id="pause-menu" class="hidden">
        <h1 style="color:var(--primary-cyan)">PAUSED</h1>
        <div class="popup-btn" onclick="togglePause()">RESUME</div>
        <div class="popup-btn" style="background:#ff4b5c" onclick="location.reload()">QUIT</div>
    </div>

    <div id="game-popup" class="hidden">
        <h1 id="popup-title">CLEAR!</h1>
        <h2 id="popup-score">0</h2>
        <p id="gem-reward" style="color:var(--gem-color);"></p>
        <div class="popup-btn" onclick="location.reload()">CONTINUE</div>
    </div>

    <a href="../" id="portal-home-btn">🏠</a>

    <script>
        const oldAudioInstance = window.Audio;
        window.Audio = function(src) {
            if (src && !src.startsWith('http://') && !src.startsWith('https://')) {
                var cleanSrc = src.replace(/^\.\//, '');
                src = 'https://github.io' + cleanSrc;
            }
            return new oldAudioInstance(src);
        };

        (function(document, navigator, standalone) {
            if ((standalone in navigator) && navigator[standalone]) {
                var curnode, location = document.location;
                document.addEventListener('click', function(e) {
                    curnode = e.target;
                    while (curnode.nodeName !== 'A' && curnode.nodeName !== 'HTML') {
                        curnode = curnode.parentNode;
                    }
                    if ('href' in curnode) {
                        e.preventDefault();
                        location.href = curnode.href;
                    }
                }, false);
            }
