<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-length: 350vh;
            margin: 0;
        }
        h1 { color: #333; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1000px;
            width: 100%;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            color: #007bff;
        }
        .text {
        	text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>APP CHOSER</h1>
    
    <div class="grid">
        <a class="card" href="https://seamlessswimmingcleaning.github.io/ReadingCalender/" target="_blank">
            📅 Reading Calendar *
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/BlockyPuzzle/" target="_blank">
            🧩 Block Blast
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/PixelBird/" target="_blank">
            🐦 Flappy Bird
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/SO/" target="_blank">
            🛒 Supermarket Organizer *
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/ProjectOngaku/" target="_blank">
            🎵 Project Ongaku
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/TCG/" target="_blank">
            🃏 TCG *
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/SimplySpend/" target="_blank">
            💰 Simply Spend
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/EASmaker/" target="_blank">
            🚨 EAS Maker
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/SketchBook/" target="_blank">
            🎨 Sketch Book
        </a>
        <a class="card" href="https://seamlessswimmingcleaning.github.io/TheRushHourHub/" target="_blank">
            🍳 The Rush Hour Hub *
        </a>
    </div>
    
    <p class="text"> * IF THE APP HAS A STAR ITS NOT COMPATIBLE WITH IPHONE * </p>

</body>
</html>
